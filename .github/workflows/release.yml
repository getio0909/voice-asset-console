name: Release candidate

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.5.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: pnpm
      - name: Validate tag and install
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          tag_version=${GITHUB_REF_NAME#v}
          tag_version=${tag_version%%-*}
          tag_version=${tag_version%%+*}
          test "$tag_version" = "$version"
          pnpm install --frozen-lockfile
      - name: Run release validation
        run: pnpm run verify
      - name: Test OCI release validation
        run: node --test scripts/verify-oci-image.node-test.mjs scripts/container-release.node-test.mjs
      - name: Build and validate gateway image
        run: |
          docker build \
            --build-arg "VERSION=$GITHUB_REF_NAME" \
            --build-arg "COMMIT=$GITHUB_SHA" \
            --tag "voiceasset-console:${GITHUB_REF_NAME//+/-}" \
            .
          docker run --rm --entrypoint caddy "voiceasset-console:${GITHUB_REF_NAME//+/-}" \
            validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Package static bundle and licenses
        shell: bash
        run: |
          bash scripts/build-release.sh "$GITHUB_REF_NAME" dist-release
          pnpm licenses:report
          mv third-party-licenses.json dist-release/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: amd64,arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: image=moby/buildkit@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
      - name: Build and verify AMD64 and ARM64 OCI image
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: '1'
        shell: bash
        run: |
          image_tag=${GITHUB_REF_NAME//+/-}
          archive="dist-release/voiceasset-console-${GITHUB_REF_NAME}-linux-amd64-arm64.oci.tar"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "VERSION=$GITHUB_REF_NAME" \
            --build-arg "COMMIT=$GITHUB_SHA" \
            --tag "voiceasset-console:$image_tag" \
            --provenance=false \
            --sbom=false \
            --output "type=oci,dest=$archive,oci-mediatypes=true" \
            .
          tar -xOf "$archive" index.json | jq -c '.manifests[] | {mediaType, platform, artifactType, annotations}'
          node scripts/verify-oci-image.mjs \
            "$archive" voiceasset-console "$GITHUB_REF_NAME" "$GITHUB_SHA"
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist-release/voiceasset-console-source.spdx.json
          upload-artifact: false
      - name: Generate checksums and verify artifacts
        shell: bash
        run: |
          bash scripts/write-checksums.sh dist-release
          bash scripts/verify-release.sh "$GITHUB_REF_NAME" "$GITHUB_SHA" dist-release \
            --require-sbom --require-container
      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
            gh release upload "$GITHUB_REF_NAME" dist-release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist-release/* --verify-tag --draft --prerelease \
              --generate-notes --title "VoiceAsset Console $GITHUB_REF_NAME"
          fi
